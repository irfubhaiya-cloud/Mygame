<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megaton Casino - Play & Win Big</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --app-bg: #14141a;
            --accent-gold: #ffcc00;
            --accent-purple: #8e44ad;
            --text-light: #ffffff;
            --text-dim: #8b8e96;
            --border-color: #2c2c36;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Phone frame simulation for desktop view */
        .app-container {
            width: 360px; /* Mobile width */
            height: 780px; /* Mobile height */
            background-color: var(--app-bg);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 4px solid #333;
        }

        /* Multiple pages inside one HTML file */
        .page {
            display: none; /* Hide all pages by default */
            width: 100%;
            height: 100%;
            padding-bottom: 70px; /* Space for bottom nav */
            overflow-y: auto;
        }

        .page.active { display: block; } /* Show only the active page */

        /* Header Style (replicated from image) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(20, 20, 26, 0.9);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .wallet-display {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--accent-gold);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-gold);
        }

        /* PAGE 1: LOGIN (Design from Screen 1) */
        #loginPage {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #1d1d26 0%, #0d0d12 100%);
        }

        .login-logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #0d0d12;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        .login-btn {
            width: 100%;
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* PAGE 2: HOME (Design from Screen 2) */
        #homePage .header { justify-content: space-between; }
        #homePage .header .wallet-display { margin-left: auto; }

        .banner {
            background: linear-gradient(to bottom right, #ffcc00, #ff6600);
            border-radius: 12px;
            padding: 20px;
            margin: 15px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .games-section { padding: 0 15px 15px 15px; }
        .section-title { font-size: 18px; margin-bottom: 10px; color: #ddd; font-weight: bold; }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .game-card {
            border-radius: 8px;
            height: 100px;
            padding: 10px;
            background: linear-gradient(to bottom, #232330 0%, #15151f 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }
        
        .game-card .title { font-size: 14px; font-weight: bold; }
        .game-card .win-amt { font-size: 12px; color: var(--accent-gold); }

        /* PAGE 3: GAME PAGE (Slots - Design from Screen 3) */
        #gamePage {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle, #2a153d 0%, #101017 100%);
        }

        .megaton-title { font-size: 28px; color: var(--accent-gold); margin-bottom: 20px; text-transform: uppercase; font-weight: 800; }
        
        .payout-info { width: 100%; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; }
        .payout-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1a1a24; }
        .payout-item .p-label { color: #aaa; font-size: 12px; }
        .payout-item .p-value { color: var(--accent-gold); font-size: 14px; font-weight: bold; }
        
        .slot-machine {
            width: 100%;
            height: 250px;
            border: 4px solid var(--accent-gold);
            border-radius: 12px;
            background-color: white;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            justify-items: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .reel-symbol { font-size: 60px; font-weight: bold; color: black; } 
        
        .bet-input-wrap { width: 100%; display: flex; gap: 10px; margin-bottom: 20px; }
        
        .game-input { flex: 1; padding: 15px; border-radius: 8px; background: #000; color: white; border: 1px solid var(--border-color); text-align: center; font-weight: bold; outline: none;}

        .spin-btn { width: 100%; padding: 15px; background-color: #c0392b; color: white; border: none; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .spin-btn:disabled { background-color: #555; cursor: not-allowed; }

        /* PAGE 4 & 5: DEPOSIT & WITHDRAW DUMMY FORMS */
        .form-page { padding: 20px; }
        .form-title { font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; color: #ddd; }
        
        .amount-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .amt-chip { flex: 1; padding: 10px; background: #1e1e26; border: 1px solid var(--border-color); border-radius: 5px; text-align: center; color: white; font-weight: bold; font-size: 14px; cursor: pointer;}
        
        .payment-methods {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }
        
        .method-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #1a1a24; cursor: pointer;}
        .method-item:last-child { border-bottom: none; }
        .method-item .m-name { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        
        .main-action-btn { width: 100%; background-color: var(--accent-gold); color: #000; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: var(--app-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent-gold); }
        .nav-item.center-nav { color: var(--accent-purple); font-weight: bold;}
        .nav-icon { font-size: 22px; }

    </style>
</head>
