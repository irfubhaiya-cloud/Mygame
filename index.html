<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18 Number Casino Betting</title>
    <style>
        :root {
            --primary-color: #ffd700;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --success: #00e676;
            --danger: #ff1744;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .casino-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 2px solid #333;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .balance-board {
            background-color: #000;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 20px;
            border: 1px solid var(--primary-color);
        }

        .balance-board span {
            color: var(--success);
            font-weight: bold;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .number-btn {
            background-color: #333;
            color: white;
            border: 2px solid transparent;
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .number-btn:hover {
            background-color: #555;
        }

        .number-btn.selected {
            background-color: var(--primary-color);
            color: #000;
            border: 2px solid #fff;
            transform: scale(1.1);
        }

        .bet-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        input[type="number"]::placeholder {
            color: #aaa;
        }

        .play-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .play-btn:hover {
            background-color: #ffea00;
        }

        .play-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        #resultArea {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            padding: 10px;
        }

        .win { background-color: rgba(0, 230, 118, 0.2); color: var(--success); border: 1px solid var(--success); }
        .lose { background-color: rgba(255, 23, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        
        .winning-number-display {
            font-size: 40px;
            color: var(--primary-color);
            margin: 10px 0;
            display: none;
        }

    </style>
</head>
<body>

    <div class="casino-container">
        <h1>Lucky 18 Casino</h1>
        <p style="color: #aaa; font-size: 12px; margin-top: -5px;">Win 10x your Bet Amount!</p>
        
        <div class="balance-board">
            Balance: ₹<span id="balance">1000</span>
        </div>

        <p style="margin-bottom: 10px; font-weight: bold;">Select Your Number:</p>
        <div class="number-grid" id="numberGrid">
            <!-- Numbers will be generated by JS -->
        </div>

        <div class="winning-number-display" id="winningNumberDisplay">?</div>

        <div class="bet-controls">
            <input type="number" id="betAmount" placeholder="Enter Bet Amount (₹)" min="10">
            <button class="play-btn" id="playBtn" onclick="placeBet()">Place Bet & Spin</button>
        </div>

        <div id="resultArea">
            Select a number and place your bet!
        </div>
    </div>

    <script>
        let balance = 1000;
        let selectedNumber = null;
        const multiplier = 10; // 10x payout for winning

        const balanceEl = document.getElementById('balance');
        const gridEl = document.getElementById('numberGrid');
        const betAmountEl = document.getElementById('betAmount');
        const resultArea = document.getElementById('resultArea');
        const playBtn = document.getElementById('playBtn');
        const winningNumberDisplay = document.getElementById('winningNumberDisplay');

        // Generate numbers 1 to 18
        for (let i = 1; i <= 18; i++) {
            const btn = document.createElement('button');
            btn.classList.add('number-btn');
            btn.innerText = i;
            btn.onclick = () => selectNumber(i, btn);
            gridEl.appendChild(btn);
        }

        // Handle number selection
        function selectNumber(num, btnElement) {
            selectedNumber = num;
            
            // Remove 'selected' class from all buttons
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // Add 'selected' class to clicked button
            btnElement.classList.add('selected');
            resultArea.innerText = `You selected Number: ${num}`;
            resultArea.className = '';
            winningNumberDisplay.style.display = 'none';
        }

        // Handle betting logic
        function placeBet() {
            const betAmount = parseInt(betAmountEl.value);

            // Validations
            if (selectedNumber === null) {
                showResult("Please select a number first!", "lose");
                return;
            }
            if (isNaN(betAmount) || betAmount <= 0) {
                showResult("Enter a valid bet amount!", "lose");
                return;
            }
            if (betAmount > balance) {
                showResult("Insufficient Balance!", "lose");
                return;
            }

            // Deduct bet amount and update UI temporarily
            balance -= betAmount;
            updateBalance();
            playBtn.disabled = true;
            resultArea.className = '';
            resultArea.innerText = "Spinning...";
            winningNumberDisplay.style.display = 'block';
            winningNumberDisplay.innerText = "🎲";

            // Simulate a short spin/loading delay
            setTimeout(() => {
                // Generate random winning number (1 to 18)
                const winningNumber = Math.floor(Math.random() * 18) + 1;
                winningNumberDisplay.innerText = winningNumber;

                // Check Win/Loss
                if (selectedNumber === winningNumber) {
                    const winnings = betAmount * multiplier;
                    balance += winnings;
                    showResult(`🎉 JACKPOT! Number ${winningNumber} won! You got ₹${winnings}`, "win");
                } else {
                    showResult(`❌ Number was ${winningNumber}. You lost ₹${betAmount}`, "lose");
                }

                updateBalance();
                playBtn.disabled = false;
            }, 1000); // 1 second delay for suspense
        }

        // Helper to update balance display
        function updateBalance() {
            balanceEl.innerText = balance;
        }

        // Helper to show results
        function showResult(message, type) {
            resultArea.innerText = message;
            resultArea.className = type;
        }
    </script>
</body>
</html>
